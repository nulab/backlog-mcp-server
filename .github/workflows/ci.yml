name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  ci:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    name: 🧪 Lint, Format, TypeCheck, Test, Build

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Install deps
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🎨 Format check (Prettier)
        run: npm run format

      - name: ✅ Type check
        run: npm run typecheck:all

      - name: 🧪 Run tests
        run: npm test

      - name: 🛠 Build
        run: npm run build
