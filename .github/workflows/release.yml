name: Release
run-name: "Release: ${{ inputs.newversion }}"

on:
  workflow_dispatch:
    inputs:
      newversion:
        type: choice
        options:
          - patch
          - minor
          - major
        description: New version
        default: patch
        required: true

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Bump version
        id: bump
        run: |
          pnpm version "${{ inputs.newversion }}" --no-git-tag-version
          new_version=$(node -p "require('./package.json').version")
          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "new_tag=v${new_version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry (ghcr.io)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        env:
          VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=false --sbom=false \
            --build-arg VERSION="${VERSION}" \
            -t "ghcr.io/nulab/backlog-mcp-server:v${VERSION}" \
            -t "ghcr.io/nulab/backlog-mcp-server:latest" \
            --push .

      - name: Publish to npm
        run: pnpm publish --no-git-checks --provenance --access public

      - name: Push version update
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git add package.json
          git commit -m "chore(bump): ${NEW_TAG}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Push version tag
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          git tag "${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: gh release create "${NEW_TAG}" --generate-notes
