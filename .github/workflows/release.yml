name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 2.3.0). Leave empty for auto.'
        required: false
permissions:
  contents: write
  packages: write
  id-token: write
jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry (ghcr.io)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run release-it
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "Manual version input: ${{ github.event.inputs.version }}"
            npx release-it ${{ github.event.inputs.version }} -y --ci
          else
            echo "Auto version release"
            npx release-it -y --ci
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # release-it bumps package.json/CHANGELOG.md before invoking `pnpm publish`,
          # leaving the working tree intentionally dirty at publish time. Disable pnpm's
          # git-checks for this step only so publish doesn't abort with ERR_PNPM_GIT_UNCLEAN.
          NPM_CONFIG_GIT_CHECKS: false
